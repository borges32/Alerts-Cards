version: "3.8"

services:
  grafana:
    image: grafana/grafana:11.3.0
    container_name: cartalert-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: alerts-cards-panel
      GF_DEFAULT_APP_MODE: development
    volumes:
      - ./plugin/dist:/var/lib/grafana/plugins/alerts-cards-panel
      - ./provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./provisioning/alerting:/etc/grafana/provisioning/alerting
      - ./provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus
    networks: [cartalert]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: cartalert-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    networks: [cartalert]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    container_name: cartalert-otel
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/otel-config.yaml:/etc/otel/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter scrape endpoint
    depends_on:
      - prometheus
    networks: [cartalert]

  metric-generator:
    build: ./metric-generator
    container_name: cartalert-generator
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on:
      - otel-collector
    networks: [cartalert]

volumes:
  grafana-storage:

networks:
  cartalert:
    driver: bridge
